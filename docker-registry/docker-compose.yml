version: "3.9"

services:
  registry:
    image: registry:2
    restart: always
    container_name: registry
    volumes:
      - registry:/var/lib/registry
    environment:
      VIRTUAL_HOST: "docker.dominik-schwaiger.ch"
      VIRTUAL_PORT: "5000"
      LETSENCRYPT_HOST: "docker.dominik-schwaiger.ch"

volumes:
  registry:

networks:
  registry:
    name: registry
    external: true
